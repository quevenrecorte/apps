<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queven Apps Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Queven Apps Hub</h1>
      <p>Personal Dashboard / Launcher</p>
      <input type="text" id="search" placeholder="Search apps, batch files, links..." />
    </header>

    <section>
      <h2>🌐 Web Apps</h2>
      <div id="apps-list" class="grid"></div>
    </section>

    <section>
      <h2>📄 Batch Files</h2>
      <div id="batch-list" class="grid"></div>
    </section>

    <section>
      <h2>🔗 Quick Links</h2>
      <div id="links-list" class="grid"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
