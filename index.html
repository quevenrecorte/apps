<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apps</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Apps</h1>
      <p>Personal Dashboard / Launcher</p>
      <input type="text" id="search" placeholder="Search apps, batch files, links..." />
    </header>

    <div class="tabs-wrap">
  <div class="tabs-row">
    <button class="tab-btn active" data-tab="apps">Web Apps</button>
    <button class="tab-btn" data-tab="batch">Batch Files</button>
    <button class="tab-btn" data-tab="links">Quick Links</button>
  </div>

  <div class="tabs-row">
    <button class="tab-btn" data-tab="business">Business</button>
    <button class="tab-btn" data-tab="server">Home Server</button>
    <button class="tab-btn" data-tab="others">Others</button>
  </div>
</div>
    </div>

    <section id="apps-tab" class="tab-content active">
      <div id="apps-list" class="grid"></div>
    </section>

    <section id="business-tab" class="tab-content">
  <div id="business-list" class="grid"></div>
</section>

<section id="server-tab" class="tab-content">
  <div id="server-list" class="grid"></div>
</section>

    <section id="batch-tab" class="tab-content">
      <div id="batch-list" class="grid"></div>
    </section>

    <section id="links-tab" class="tab-content">
      <div id="links-list" class="grid"></div>
    </section>

    <section id="others-tab" class="tab-content">
  <div id="others-list" class="grid"></div>
</section>
  </div>

  <script src="app.js"></script>
</body>
</html>
